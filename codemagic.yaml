workflows:
  ios-unsigned:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          set -e
          cd ClipDropper-iOS
          npm ci
      - name: Generate native iOS project
        script: |
          set -e
          cd ClipDropper-iOS
          npx expo prebuild --platform ios --no-install
          echo "=== ios/ contents ==="
          ls -la ios/
      - name: Install CocoaPods
        script: |
          set -e
          cd ClipDropper-iOS/ios
          pod install --repo-update
          echo "=== Workspace check ==="
          ls -la .
      - name: Build unsigned
        script: |
          set -e
          xcodebuild \
            -workspace ClipDropper-iOS/ios/ClipDropper.xcworkspace \
            -scheme ClipDropper \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            -derivedDataPath derived
      - name: Package into IPA
        script: |
          set -e
          APP=$(find derived -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ClipDropper.ipa Payload/
    artifacts:
      - ClipDropper.ipa
