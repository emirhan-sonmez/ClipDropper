workflows:
  ios-unsigned:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate native iOS project
        script: |
          npx expo prebuild --platform ios --no-install
          echo "=== ios/ contents ===" && ls ios/ || (echo "ERROR: ios/ not created" && exit 1)
      - name: Install CocoaPods
        script: cd ios && pod install --repo-update
      - name: Build unsigned
        script: |
          xcodebuild \
            -workspace ios/ClipDropper.xcworkspace \
            -scheme ClipDropper \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            -derivedDataPath "$CM_BUILD_DIR/derived"
      - name: Package into IPA
        script: |
          APP=$(find "$CM_BUILD_DIR/derived" -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR" && zip -r ClipDropper.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ClipDropper.ipa
